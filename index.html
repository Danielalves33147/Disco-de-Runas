<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disco Arcano Ritual</title>
  <style>
    :root {
      --rune: #d6e6ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);

      --board-size: min(760px, 94vw);

      --outer-size: 700px;
      --middle-size: 520px;
      --inner-size: 340px;

      --outer-track: 308px;
      --middle-track: 225px;
      --inner-track: 138px;

      --chip-size-outer: 42px;
      --chip-size-middle: 48px;
      --chip-size-inner: 54px;

      --seal-size: 118px;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(77, 117, 205, 0.14), transparent 26%),
        radial-gradient(circle at 50% 15%, rgba(117, 81, 255, 0.12), transparent 24%),
        linear-gradient(180deg, #090b13 0%, #05060b 100%);
      color: var(--rune);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.08) 0 1px, transparent 1px),
        radial-gradient(circle, rgba(133, 188, 255, 0.08) 0 1px, transparent 1px);
      background-size: 48px 48px, 96px 96px;
      background-position: 0 0, 24px 24px;
      opacity: 0.35;
      mix-blend-mode: screen;
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: center;
      justify-items: center;
      padding: 24px;
      gap: 20px;
    }

    .errors {
      display: flex;
      gap: 14px;
      z-index: 4;
    }

    .error-mark {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,0.22), rgba(255,255,255,0.02) 45%),
        rgba(255,255,255,0.02);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 0 18px rgba(255,255,255,0.04);
      transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease;
    }

    .error-mark.active {
      background: radial-gradient(circle at 35% 35%, #ff9fa8, #ff4658 48%, #7d0f1a 100%);
      border-color: rgba(255, 145, 155, 0.9);
      box-shadow: 0 0 18px rgba(255, 80, 95, 0.45), 0 0 38px rgba(255, 80, 95, 0.2);
      transform: scale(1.08);
    }

    #stage {
      width: min(1040px, calc(100vw - 48px));
      height: min(800px, calc(100vh - 120px));
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(12,18,34,0.85), rgba(8,12,24,0.9)),
        radial-gradient(circle at 50% 50%, rgba(137, 193, 255, 0.07), transparent 40%);
      border: 1px solid rgba(140, 188, 255, 0.18);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.03);
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: clamp(20px, 2.7vw, 32px);
    }

    #stage::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 22px;
      border: 1px solid rgba(133, 188, 255, 0.08);
      pointer-events: none;
    }

    #stage.success-mode {
      box-shadow:
        var(--shadow),
        0 0 44px rgba(143,240,255,0.14),
        inset 0 0 60px rgba(143,240,255,0.05);
    }

    .board {
      width: var(--board-size);
      height: var(--board-size);
      position: relative;
      display: grid;
      place-items: center;
      touch-action: manipulation;
    }

    .board.success-mode {
      isolation: isolate;
    }

    .board.success-mode::before {
      content: "";
      position: absolute;
      inset: -8%;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(
          circle,
          rgba(223,252,255,0.10) 0%,
          rgba(143,240,255,0.16) 24%,
          rgba(143,240,255,0.05) 48%,
          transparent 70%
        );
      filter: blur(10px);
      animation: successDiskHalo 2.4s ease-in-out infinite alternate;
    }

    .focus-glyph {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      z-index: 32;
      pointer-events: none;
      color: rgba(223,252,255,0.95);
      font-size: 24px;
      font-weight: 700;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,0.18), rgba(255,255,255,0.02) 46%),
        linear-gradient(180deg, rgba(18,28,52,0.94), rgba(7,11,22,0.96));
      border: 1px solid rgba(121,197,255,0.36);
      box-shadow: 0 0 16px rgba(121,197,255,0.24), inset 0 0 18px rgba(121,197,255,0.08);
    }

    .focus-glyph::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px solid rgba(223,252,255,0.12);
    }

    .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }

    .ring-outer  { width: var(--outer-size);  height: var(--outer-size);  z-index: 1; }
    .ring-middle { width: var(--middle-size); height: var(--middle-size); z-index: 2; }
    .ring-inner  { width: var(--inner-size);  height: var(--inner-size);  z-index: 3; }

    .ring-hit {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      cursor: pointer;
      z-index: 4;
      background: transparent;
    }

    .ring-hit.disabled { cursor: not-allowed; }

    .ring-rotor {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      transition: transform 280ms cubic-bezier(.22,.9,.24,1), filter 260ms ease, opacity 260ms ease;
      will-change: transform;
      pointer-events: none;
    }

    .ring-track { position: absolute; inset: 0; border-radius: 50%; }
    .ring-track::before,
    .ring-track::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .ring-track::before {
      border: 1px solid rgba(147, 193, 255, 0.16);
      transition: border-color .24s ease, box-shadow .24s ease, opacity .24s ease;
    }

    .ring-outer .ring-track::after {
      background: radial-gradient(circle, transparent 58%, rgba(132,190,255,0.06) 58%, rgba(132,190,255,0.06) 60%, transparent 60%);
    }

    .ring-middle .ring-track::after {
      background: radial-gradient(circle, transparent 57%, rgba(132,190,255,0.06) 57%, rgba(132,190,255,0.06) 59%, transparent 59%);
    }

    .ring-inner .ring-track::after {
      background: radial-gradient(circle, transparent 55%, rgba(132,190,255,0.06) 55%, rgba(132,190,255,0.06) 57%, transparent 57%);
    }

    .ring-symbol {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 0 0;
      pointer-events: none;
    }

    .symbol-upright {
      display: grid;
      place-items: center;
      transform-origin: center center;
      transition: transform 280ms cubic-bezier(.22,.9,.24,1), filter 240ms ease, opacity 240ms ease;
      will-change: transform;
    }

    .ring-outer .symbol-upright { width: var(--chip-size-outer); height: var(--chip-size-outer); }
    .ring-middle .symbol-upright { width: var(--chip-size-middle); height: var(--chip-size-middle); }
    .ring-inner .symbol-upright { width: var(--chip-size-inner); height: var(--chip-size-inner); }

    .symbol-chip {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(14,22,43,0.98), rgba(8,12,24,0.98));
      border: 1px solid rgba(147, 193, 255, 0.14);
      box-shadow: inset 0 0 14px rgba(132,190,255,0.06);
      text-shadow: 0 0 10px rgba(132,190,255,0.18);
      font-weight: 600;
      transition: border-color .24s ease, box-shadow .24s ease, background .24s ease, opacity .24s ease;
    }

    .ring-outer .symbol-chip  { font-size: 22px; }
    .ring-middle .symbol-chip { font-size: 26px; }
    .ring-inner .symbol-chip  { font-size: 30px; }

    .seal-button {
      width: var(--seal-size);
      height: var(--seal-size);
      border-radius: 50%;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background:
        radial-gradient(circle at 38% 34%, rgba(255,255,255,0.18), rgba(255,255,255,0.03) 28%, rgba(84,115,255,0.12) 46%, rgba(255,255,255,0.02) 72%),
        linear-gradient(180deg, rgba(14,22,43,0.98), rgba(8,12,24,0.98));
      border: 1px solid rgba(147, 193, 255, 0.2);
      box-shadow: inset 0 0 26px rgba(132,190,255,0.1), 0 0 24px rgba(132,190,255,0.08);
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, box-shadow .24s ease, filter .24s ease;
    }

    .seal-button:hover {
      transform: translate(-50%, -50%) scale(1.03);
      border-color: rgba(147, 193, 255, 0.34);
    }

    .seal-button::before,
    .seal-button::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .seal-button::after {
      inset: 28px;
      border-color: rgba(143, 240, 255, 0.18);
      box-shadow: inset 0 0 22px rgba(143, 240, 255, 0.08);
    }

    .seal-button.charged {
      box-shadow:
        inset 0 0 32px rgba(143,240,255,0.16),
        0 0 24px rgba(132,190,255,0.08),
        0 0 42px rgba(143,240,255,0.12);
      filter: brightness(1.08);
    }

    .board.success-mode #board-core {
      filter: brightness(1.18) saturate(1.15);
    }

    .board.success-mode .ring-rotor {
      filter: brightness(1.22) saturate(1.14) !important;
    }

    .board.success-mode .ring-track::before {
      border-color: rgba(223,252,255,0.86) !important;
      box-shadow:
        0 0 30px rgba(143,240,255,0.24),
        inset 0 0 22px rgba(143,240,255,0.10) !important;
    }

    .board.success-mode .symbol-chip {
      border-color: rgba(223,252,255,0.56) !important;
      box-shadow:
        inset 0 0 22px rgba(143,240,255,0.18),
        0 0 16px rgba(143,240,255,0.10) !important;
      background: linear-gradient(
        180deg,
        rgba(18,38,72,0.99),
        rgba(9,16,34,0.99)
      ) !important;
    }

    .board.success-mode .seal-button {
      filter: brightness(1.22) saturate(1.18);
      box-shadow:
        inset 0 0 38px rgba(143,240,255,0.24),
        0 0 60px rgba(143,240,255,0.18),
        0 0 110px rgba(143,240,255,0.08);
    }

    .board.success-mode .focus-glyph {
      border-color: rgba(223,252,255,0.56);
      box-shadow:
        0 0 22px rgba(143,240,255,0.28),
        inset 0 0 24px rgba(143,240,255,0.10);
    }

    .success-overlay {
      position: absolute;
      inset: 0;
      z-index: 140;
      pointer-events: none;
      overflow: hidden;
    }

    .success-flare {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 260px;
      height: 260px;
      transform: translate(-50%, -50%) scale(0.45);
      border-radius: 50%;
      opacity: 0;
      filter: blur(4px);
      background:
        radial-gradient(
          circle,
          rgba(223,252,255,0.26) 0%,
          rgba(143,240,255,0.14) 28%,
          rgba(143,240,255,0.04) 52%,
          transparent 72%
        );
      animation: successFlare 1.2s ease forwards;
    }

    .success-wave {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120px;
      height: 120px;
      transform: translate(-50%, -50%) scale(0.22);
      border-radius: 50%;
      opacity: 0;
      border: 1px solid rgba(223,252,255,0.38);
      box-shadow:
        0 0 24px rgba(143,240,255,0.18),
        inset 0 0 24px rgba(143,240,255,0.08);
      animation: successWave 1.15s cubic-bezier(.18,.86,.22,1) .08s forwards;
    }

    .success-beam {
      position: absolute;
      left: 50%;
      top: -10%;
      bottom: -10%;
      width: 14px;
      transform: translateX(-50%) scaleY(0.05);
      transform-origin: center center;
      opacity: 0;
      border-radius: 999px;
      background:
        linear-gradient(
          180deg,
          transparent 0%,
          rgba(143,240,255,0.36) 18%,
          rgba(223,252,255,0.98) 50%,
          rgba(143,240,255,0.36) 82%,
          transparent 100%
        );
      box-shadow:
        0 0 22px rgba(143,240,255,0.34),
        0 0 70px rgba(143,240,255,0.18);
      animation: successBeam 0.95s cubic-bezier(.22,.84,.2,1) forwards;
    }

    .success-beam::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 84px;
      height: 84px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(
          circle,
          rgba(223,252,255,0.95),
          rgba(143,240,255,0.30) 46%,
          transparent 72%
        );
      box-shadow: 0 0 24px rgba(143,240,255,0.28);
    }

    .success-barrier {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scaleX(0.02);
      transform-origin: center center;
      border: 1px solid rgba(143,240,255,0.16);
      box-shadow:
        inset 0 0 54px rgba(143,240,255,0.14),
        0 0 80px rgba(143,240,255,0.16);
      background:
        linear-gradient(
          90deg,
          rgba(143,240,255,0.03),
          rgba(143,240,255,0.12),
          rgba(143,240,255,0.03)
        ),
        repeating-linear-gradient(
          90deg,
          rgba(143,240,255,0.08) 0 2px,
          transparent 2px 18px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(143,240,255,0.06) 0 2px,
          transparent 2px 18px
        );
      animation:
        successBarrierExpand 1.35s cubic-bezier(.18,.82,.2,1) .34s forwards,
        successBarrierHum 3.4s ease-in-out 1.7s infinite;
    }

    .success-barrier::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          rgba(223,252,255,0.00) 36%,
          rgba(223,252,255,0.18) 50%,
          rgba(223,252,255,0.00) 64%,
          transparent 100%
        );
      animation: barrierSweep 3.8s linear 1.9s infinite;
    }

    .success-barrier::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(143,240,255,0.18), transparent 42%);
      opacity: 0.75;
    }

    .stage-flash { animation: stageFlash .4s ease; }
    @keyframes stageFlash {
      0% { box-shadow: var(--shadow), 0 0 0 rgba(255,255,255,0); }
      35% { box-shadow: var(--shadow), 0 0 40px rgba(255, 80, 95, 0.18); }
      100% { box-shadow: var(--shadow), 0 0 0 rgba(255,255,255,0); }
    }

    .shake { animation: shake .35s ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(3px); }
    }

    .board-energy {
      position: absolute;
      inset: 6%;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity .28s ease;
      background:
        radial-gradient(circle at center, rgba(143,240,255,0.1), transparent 42%),
        conic-gradient(from 0deg, rgba(143,240,255,0.0), rgba(143,240,255,0.16), rgba(143,240,255,0.0), rgba(143,240,255,0.16), rgba(143,240,255,0.0));
      filter: blur(2px);
      z-index: 0;
    }

    .board-energy.active {
      opacity: 1;
      animation: boardEnergySpin 2.2s linear infinite;
    }

    @keyframes boardEnergySpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .energy-path {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 320px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 14;
      opacity: 0;
      background:
        linear-gradient(180deg,
          rgba(143,240,255,0),
          rgba(143,240,255,0.15) 12%,
          rgba(143,240,255,0.95) 46%,
          rgba(223,252,255,0.98) 50%,
          rgba(143,240,255,0.95) 54%,
          rgba(143,240,255,0.18) 88%,
          rgba(143,240,255,0)
        );
      border-radius: 999px;
      box-shadow: 0 0 16px rgba(143,240,255,0.35), 0 0 40px rgba(143,240,255,0.18);
      filter: blur(.2px);
    }

    .energy-path.flow { animation: energyFlow .72s ease forwards; }
    @keyframes energyFlow {
      0% { opacity: 0; transform: translate(-50%, -50%) scaleY(0.15); }
      35% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scaleY(1.02); }
    }

    .ring.locked-ring .ring-track::before { border-color: rgba(120, 145, 184, 0.1); box-shadow: none; }
    .ring.locked-ring .ring-rotor { opacity: 0.38; filter: saturate(0.7) brightness(0.7); }
    .ring.active-ring .ring-track::before { border-color: rgba(143,240,255,0.32); box-shadow: 0 0 14px rgba(143,240,255,0.12); }
    .ring.solved-ring .ring-track::before { border-color: rgba(143,240,255,0.55); box-shadow: 0 0 18px rgba(143,240,255,0.2), inset 0 0 18px rgba(143,240,255,0.08); }
    .ring.solved-ring .ring-rotor { filter: brightness(1.1) saturate(1.06); }
    .ring.solved-ring .symbol-chip {
      border-color: rgba(143,240,255,0.34);
      box-shadow: inset 0 0 16px rgba(143,240,255,0.14), 0 0 10px rgba(143,240,255,0.08);
      background: linear-gradient(180deg, rgba(15,30,56,0.99), rgba(8,14,30,0.99));
    }

    .ring.charge-1 .ring-track::before { border-color: rgba(143,240,255,0.42); box-shadow: 0 0 14px rgba(143,240,255,0.12), inset 0 0 10px rgba(143,240,255,0.04); }
    .ring.charge-1 .ring-rotor { filter: brightness(1.02) saturate(1.02); }
    .ring.charge-1 .symbol-chip { border-color: rgba(143,240,255,0.24); box-shadow: inset 0 0 14px rgba(143,240,255,0.08), 0 0 8px rgba(143,240,255,0.04); }
    .ring.charge-2 .ring-track::before { border-color: rgba(143,240,255,0.56); box-shadow: 0 0 20px rgba(143,240,255,0.18), inset 0 0 14px rgba(143,240,255,0.06); }
    .ring.charge-2 .ring-rotor { filter: brightness(1.1) saturate(1.08); }
    .ring.charge-2 .symbol-chip { border-color: rgba(143,240,255,0.36); box-shadow: inset 0 0 16px rgba(143,240,255,0.14), 0 0 12px rgba(143,240,255,0.08); background: linear-gradient(180deg, rgba(16,31,60,0.99), rgba(8,14,30,0.99)); }
    .ring.charge-3 .ring-track::before { border-color: rgba(223,252,255,0.78); box-shadow: 0 0 26px rgba(143,240,255,0.28), inset 0 0 18px rgba(143,240,255,0.09), 0 0 40px rgba(223,252,255,0.1); }
    .ring.charge-3 .ring-rotor { filter: brightness(1.16) saturate(1.12); }
    .ring.charge-3 .symbol-chip { border-color: rgba(223,252,255,0.52); box-shadow: inset 0 0 18px rgba(143,240,255,0.18), 0 0 16px rgba(143,240,255,0.12), 0 0 24px rgba(223,252,255,0.08); background: linear-gradient(180deg, rgba(18,34,66,0.99), rgba(9,15,32,0.99)); }

    .ring.pulse-ring .ring-track::before,
    .ring.pulse-ring .symbol-chip { animation: solvedPulse .55s ease; }

    @keyframes solvedPulse {
      0% { filter: brightness(1); }
      40% { filter: brightness(1.45); }
      100% { filter: brightness(1); }
    }

    .board-runes-awaken {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 40;
      opacity: 0;
    }

    .board-runes-awaken.active { opacity: 1; }

    .awaken-rune {
      position: absolute;
      color: rgba(223,252,255,0.9);
      text-shadow: 0 0 18px rgba(143,240,255,0.35), 0 0 8px rgba(143,240,255,0.2);
      opacity: 0;
      transform: scale(0.72);
      animation: awakenRune .9s ease forwards;
    }

    @keyframes awakenRune {
      0% { opacity: 0; transform: scale(0.5) translateY(12px); }
      45% { opacity: 1; }
      100% { opacity: 0.92; transform: scale(1) translateY(0); }
    }

    .error-burst {
      position: absolute;
      inset: 16%;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 50;
      background: radial-gradient(circle, rgba(255,120,132,0.24), rgba(255,80,95,0.12) 38%, rgba(255,80,95,0) 68%);
    }

    .error-burst.active { animation: errorBurst .52s ease; }

    .screen-cracks {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 60;
      opacity: 0;
      transition: opacity .22s ease, filter .22s ease;
      mix-blend-mode: screen;
    }

    .screen-cracks svg { width: 100%; height: 100%; display: block; }

    .screen-cracks .main-crack,
    .screen-cracks .branch-crack,
    .screen-cracks .micro-crack {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .screen-cracks .main-crack.back { stroke: rgba(255, 80, 95, 0.08); stroke-width: 10; filter: blur(3px); }

      const ring = rings[ringIndex];
      return ring.symbols[mod(-state.rotations[ringIndex], ring.symbols.length)];

      return !state.locked && state.activeRing === index && !state.solved[index];

      if (!isRingInteractive(index)) return;

      const count = rings[index].symbols.length;
      const stepDeg = 360 / count;

                  <path class="micro-crack front" d="M784 774 L744 804 L720 842"></path>
                  <path class="main-crack back" d="M500 506 L500 420 L502 326 L498 238 L502 146 L500 58"></path>
                  <path class="main-crack front" d="M500 506 L500 420 L502 326 L498 238 L502 146 L500 58"></path>
                  <path class="main-crack back" d="M502 514 L500 610 L504 706 L499 808 L502 902 L500 998"></path>
                  <path class="main-crack front" d="M502 514 L500 610 L504 706 L499 808 L502 902 L500 998"></path>
                  <path class="branch-crack back" d="M500 420 L548 380 L596 354 L636 336"></path>
                  <path class="branch-crack front" d="M500 420 L548 380 L596 354 L636 336"></path>
                  <path class="branch-crack back" d="M500 610 L450 648 L402 678 L350 710"></path>
                  <path class="branch-crack front" d="M500 610 L450 648 L402 678 L350 710"></path>
                </g>
              </svg>
            </div>

            ${rings.map((ring, index) => renderRing(ring, index)).join("")}
            <button class="seal-button charged" id="seal-main" aria-label="Canalizar"></button>
            ${renderAwakenRunes()}
          </div>

          <div class="fracture-scene" id="fracture-scene"></div>
          <div class="failure-text" id="failure-text">
            <div class="title">Núcleo Fraturado</div>
          </div>
        </div>
      `;

      document.querySelectorAll(".ring-hit").forEach(hit => {
        hit.addEventListener("click", event => {
          event.stopPropagation();
          rotateRing(Number(hit.dataset.ring));
        });
      });

      document.getElementById("seal-main").addEventListener("click", event => {
        event.stopPropagation();
        verifyCurrentRing();
      });

      updateRingStatesUI();
    }

    function updateRingStatesUI() {
      rings.forEach((ring, index) => {
        const ringWrap = document.querySelector(`[data-ring-wrap="${index}"]`);
        const hit = document.querySelector(`.ring-hit[data-ring="${index}"]`);
        if (!ringWrap || !hit) return;

        ringWrap.classList.remove("locked-ring", "active-ring", "solved-ring", "charge-1", "charge-2", "charge-3");
        hit.classList.remove("disabled");

        const solvedCount = state.solved.filter(Boolean).length;
        if (solvedCount > 0) {
          ringWrap.classList.add(`charge-${Math.min(solvedCount, 3)}`);
        }

        if (state.solved[index]) {
          ringWrap.classList.add("solved-ring");
          hit.classList.add("disabled");
          return;
        }

        if (state.activeRing === index && !state.locked) {
          ringWrap.classList.add("active-ring");
          return;
        }

        ringWrap.classList.add("locked-ring");
        hit.classList.add("disabled");
      });

      updateCrystalCracks();
    }

    function flashEnergyFlow() {
      const path = document.getElementById("energy-path");
      animate(path, "flow");
    }

    function pulseSolvedRing(index) {
      const ringWrap = document.querySelector(`[data-ring-wrap="${index}"]`);
      animate(ringWrap, "pulse-ring");
    }

    function verifyCurrentRing() {
      if (state.locked) return;

      const currentIndex = state.activeRing;
      const phaseKey = PHASES[currentIndex];
      const expected = solutionRunes[phaseKey];
      const actual = getFocusedSymbol(currentIndex);

      if (actual === expected) {
        solveCurrentRing();
      } else {
        registerError();
      }
    }

    function solveCurrentRing() {
      const solvedIndex = state.activeRing;
      state.solved[solvedIndex] = true;

      pulseSolvedRing(solvedIndex);
      flashEnergyFlow();
      updateRingStatesUI();

      const boardEnergy = document.getElementById("board-energy");
      if (boardEnergy) {
        boardEnergy.classList.add("active");
      }

      if (solvedIndex < rings.length - 1) {
        state.activeRing += 1;
        setTimeout(updateRingStatesUI, 180);
      } else {
        setTimeout(success, 320);
      }
    }

    function registerError() {
      if (state.locked) return;

      state.errors += 1;
      updateErrors();
      updateCrystalCracks();

      animate(stageEl, "stage-flash");
      animate(stageEl, "shake");
      animate(document.getElementById("error-burst"), "active");

      if (state.errors >= 3) {
        fail();
      }
    }

    function updateCrystalCracks() {
      const cracks = document.getElementById("screen-cracks");
      if (!cracks || cracks.classList.contains("locked-failure")) return;

      cracks.classList.remove("level-1", "level-2", "level-3");

      if (state.errors <= 0) return;
      cracks.classList.add(`level-${Math.min(state.errors, 3)}`);
    }

    function success() {
      state.locked = true;

      const board = document.getElementById("board-main");
      const awaken = document.getElementById("board-runes-awaken");
      const energy = document.getElementById("board-energy");
      const seal = document.getElementById("seal-main");

      document.querySelectorAll(".ring-hit").forEach(hit => {
        hit.classList.add("disabled");
        hit.style.pointerEvents = "none";
      });

      if (seal) {
        seal.disabled = true;
        seal.style.pointerEvents = "none";
      }

      stageEl.classList.add("success-mode");

      if (board) board.classList.add("success-mode");
      if (awaken) awaken.classList.add("active");
      if (energy) energy.classList.add("active");

      if (!stageEl.querySelector(".success-overlay")) {
        const overlay = document.createElement("div");
        overlay.className = "success-overlay";
        overlay.innerHTML = `
          <div class="success-flare"></div>
          <div class="success-wave"></div>
          <div class="success-beam"></div>
          <div class="success-barrier"></div>
        `;
        stageEl.appendChild(overlay);
      }
    }

    function buildFracturePieces() {
      const fractureScene = document.getElementById("fracture-scene");
      const boardCore = document.getElementById("board-core");
      if (!fractureScene || !boardCore) return;

      fractureScene.innerHTML = "";
      const pieces = [{ cls: "top" }, { cls: "left" }, { cls: "right" }, { cls: "bottom" }];

      pieces.forEach((piece, index) => {
        const wrap = document.createElement("div");
        wrap.className = `fracture-piece ${piece.cls}`;
        wrap.style.animationDelay = `${index * 0.05}s`;

        const clone = boardCore.cloneNode(true);
        clone.id = "";
        clone.querySelectorAll("[id]").forEach(el => el.removeAttribute("id"));
        clone.querySelectorAll(".ring-hit").forEach(el => el.remove());

        const button = clone.querySelector(".seal-button");
        if (button) button.remove();

        wrap.appendChild(clone);
        fractureScene.appendChild(wrap);
      });

      requestAnimationFrame(() => {
        fractureScene.classList.add("ready");
        boardCore.classList.add("fracturing");

        setTimeout(() => {
          fractureScene.querySelectorAll(".fracture-piece").forEach(piece => {
            piece.classList.add("start");
          });
        }, 90);

        setTimeout(() => {
          boardCore.classList.add("destroying");
        }, 220);
      });
    }

    function fail() {
      state.locked = true;

      const cracks = document.getElementById("screen-cracks");
      const failureText = document.getElementById("failure-text");
      const board = document.getElementById("board-main");
      const seal = document.getElementById("seal-main");

      if (board) animate(board, "shake");

      if (seal) {
        seal.disabled = true;
        seal.style.pointerEvents = "none";
        seal.style.filter = "brightness(0.7) saturate(0.7)";
      }

      document.querySelectorAll(".ring-hit").forEach(hit => {
        hit.classList.add("disabled");
        hit.style.pointerEvents = "none";
      });

      if (cracks) {
        cracks.classList.remove("level-1", "level-2", "level-3");
        cracks.classList.add("locked-failure");
      }

      setTimeout(buildFracturePieces, 2350);

      if (failureText) {
        setTimeout(() => failureText.classList.add("active"), 2580);
      }
    }

    updateErrors();
    render();
  </script>
</body>
</html>
